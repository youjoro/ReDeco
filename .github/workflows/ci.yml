name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install --legacy-peer-deps
      - run: npm run lint --if-present
      - run: npm run test --if-present
      - run: npm run build

  # Deploy job is gated on the build-and-test job so it will not run if any earlier
  # steps or jobs fail. It also only runs on push events (not pull requests).
  deploy:
    needs: [build-and-test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deployment placeholder
        run: echo "Deploy would run here. This job only runs if build-and-test succeeded."
