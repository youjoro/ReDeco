<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room Planner</title>
    <!--
      Content Security Policy
      – script-src: only same-origin scripts + blob workers (needed for background-removal WASM workers)
      – style-src: unsafe-inline required for React inline styles
      – img-src: allow blob/data (canvas/uploads), Pixabay CDN, Supabase storage, placeholder
      – connect-src: Supabase REST + realtime, Pixabay API, jsdelivr (background-removal model CDN)
      – worker-src: blob workers for WASM (background-removal)
      – object-src / base-uri: locked down to prevent plugin and base-tag attacks
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:;
      style-src 'self' 'unsafe-inline';
      img-src 'self' blob: data: https://*.pixabay.com https://pixabay.com https://*.supabase.co https://placehold.co;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://pixabay.com https://cdn.jsdelivr.net;
      worker-src blob: 'self';
      child-src blob: 'self';
      font-src 'self' data:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
