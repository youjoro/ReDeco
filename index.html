<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReDeco</title>
    <!--
      Content Security Policy
      – script-src: 'self' + blob: workers + wasm-unsafe-eval only. No unsafe-inline/eval.
        Vite dev HMR injects an inline module bootstrap — if the error
        overlay stops working in dev that's acceptable; it is not present
        in production builds.
      – style-src: unsafe-inline required for React inline styles (cannot be
        removed without a full refactor away from style={{}} props)
      – img-src: blob/data (canvas/uploads), Pixabay CDN, Supabase storage,
                 Unsplash (Landing page + furniture fixtures), placehold.co (fallback)
      – connect-src: Supabase REST + realtime, Pixabay API,
                     jsdelivr (background-removal model weights fetched at runtime),
                     app.glitchtip.com (Sentry-compatible error reporting endpoint)
      – worker-src: blob workers for WASM (background-removal)
      – object-src / base-uri: locked down to prevent plugin/base-tag attacks
      – upgrade-insecure-requests: force HTTPS for all sub-resource requests
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' blob: 'wasm-unsafe-eval';
      style-src 'self' 'unsafe-inline';
      img-src 'self' blob: data: https://*.pixabay.com https://pixabay.com https://*.supabase.co https://placehold.co https://images.unsplash.com;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://pixabay.com https://cdn.pixabay.com https://cdn.jsdelivr.net https://app.glitchtip.com;
      worker-src blob: 'self';
      child-src blob: 'self';
      font-src 'self' data:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    " />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
