<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- ReDeco "R" person lettermark — brand color #b85c38 -->
  <!-- Head -->
  <circle cx="19" cy="10" r="7.5" fill="#b85c38"/>
  <!-- Back block (upper-right, forms bowl of R) -->
  <rect x="25" y="7" width="11" height="16" rx="2" fill="#b85c38"/>
  <!-- Vertical stem -->
  <rect x="12" y="16" width="9" height="26" rx="4.5" fill="#b85c38"/>
  <!-- Left foot -->
  <rect x="7"  y="38" width="18" height="6" rx="3" fill="#b85c38"/>
  <!-- Diagonal right leg -->
  <line x1="27" y1="27" x2="38" y2="43" stroke="#b85c38" stroke-width="8" stroke-linecap="round"/>
  <!-- Right foot -->
  <rect x="31" y="40" width="13" height="6" rx="3" fill="#b85c38"/>
</svg>
